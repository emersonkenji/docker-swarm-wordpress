version: "3.7"

services:
  mysql:
    image: mariadb:latest
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 10
        window: 15s
      labels:
        - "traefik.enable=false"
    environment:
        MYSQL_DATABASE: wordpress
        MYSQL_USER: wordpress
        MYSQL_PASSWORD: wordpress
        MYSQL_ROOT_PASSWORD: wordpressroot
    volumes:
      - mysql_data_takadatintas:/var/lib/mysql
    networks:
      - nw-backend

  wordpress:
    image: wordpress:6.7.1-php8.3-fpm-alpine
    deploy:
      replicas: 1
      update_config:
        parallelism: 1
        delay: 5s
        order: start-first
      restart_policy:
        condition: any
        delay: 10s
        max_attempts: 10
        window: 15s
      labels:
        - "traefik.enable=false"
    environment:
        WORDPRESS_DB_HOST: mysql
        WORDPRESS_DB_USER: wordpress
        WORDPRESS_DB_PASSWORD: wordpress
        WORDPRESS_DB_NAME: wordpress
        WORDPRESS_TABLE_PREFIX: wp_
        WORDPRESS_CONFIG_EXTRA: |
          define('WP_HOME','https://takadatintas.com.br');
          define('WP_SITEURL','https://takadatintas.com.br');
    depends_on:
      - mysql
    volumes:
      - wp_data_takadatintas:/var/www/html
      - ./apps/wordpress/php.ini:/usr/local/etc/php/php.ini
    networks:
      - nw-backend    

  nginx:
    image: iiriix/nginx-wp:latest
    deploy:
      replicas: 1
      update_config:
        parallelism: 1
        delay: 5s
        order: start-first
      restart_policy:
        condition: any
        delay: 10s
        max_attempts: 10
        window: 15s
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.nginx_takadatintas.rule=Host(`takadatintas.com.br`, `www.takadatintas.com.br`)"
        - "traefik.http.routers.nginx_takadatintas.tls.certresolver=le"
        - "traefik.http.routers.nginx_takadatintas.entrypoints=websecure"
        - "traefik.http.routers.nginx_takadatintas.tls=true"
        - "traefik.http.routers.nginx_takadatintas.service=nginx_takadatintas"
        - "traefik.http.services.nginx_takadatintas.loadbalancer.server.port=80"
    depends_on:
      - wordpress
    volumes:
      - ./apps/nginx/nginx_conf/nginx.conf:/etc/nginx/nginx.conf
      - ./apps/nginx/nginx_conf/conf.d/default.conf:/etc/nginx/conf.d/default.conf
      - wp_data_takadatintas:/var/www/html
    networks:
      - nw-backend
      - proxy

volumes:
  wp_data_takadatintas:
    driver: local
    driver_opts:
       o: bind
       type: none
       device: /data/wp_data_takadatintas
  mysql_data_takadatintas:
    driver: local
    driver_opts:
       o: bind
       type: none
       device: /data/mysql_data_takadatintas

networks:
  proxy:
    external: true
  nw-backend:
    external: true